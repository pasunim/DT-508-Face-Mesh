<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Mesh — MediaPipe Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
    <div class="container my-4">
        <h1 class="h3 mb-2">🎭 Face Mesh</h1>
        <p class="text-muted mb-3">MediaPipe Tasks API — real-time landmark detection</p>

        <div class="mb-3 d-flex flex-wrap align-items-center gap-3">
            <div class="d-flex align-items-center gap-1">
                <button class="btn btn-outline-secondary btn-sm active" data-layer="mesh"
                    onclick="toggleLayer('mesh')">Mesh</button>
                <input type="color" class="form-control form-control-color" data-color-layer="mesh" title="สีของ Mesh"
                    value="#c0c0c0" onchange="setLayerColor('mesh', this.value)" />
            </div>
            <div class="d-flex align-items-center gap-1">
                <button class="btn btn-outline-secondary btn-sm active" data-layer="eyes"
                    onclick="toggleLayer('eyes')">Eyes</button>
                <input type="color" class="form-control form-control-color" data-color-layer="rightEye"
                    title="สีของ Right Eye" value="#ff3030" onchange="setLayerColor('rightEye', this.value)" />
                <input type="color" class="form-control form-control-color" data-color-layer="leftEye"
                    title="สีของ Left Eye" value="#30ff30" onchange="setLayerColor('leftEye', this.value)" />
            </div>
            <div class="d-flex align-items-center gap-1">
                <button class="btn btn-outline-secondary btn-sm active" data-layer="lips"
                    onclick="toggleLayer('lips')">Lips</button>
                <input type="color" class="form-control form-control-color" data-color-layer="lips" title="สีของ Lips"
                    value="#e0e0e0" onchange="setLayerColor('lips', this.value)" />
            </div>
            <div class="d-flex align-items-center gap-1">
                <button class="btn btn-outline-secondary btn-sm active" data-layer="oval"
                    onclick="toggleLayer('oval')">Oval</button>
                <input type="color" class="form-control form-control-color" data-color-layer="oval" title="สีของ Oval"
                    value="#f9a8d4" onchange="setLayerColor('oval', this.value)" />
            </div>
            <div class="d-flex align-items-center gap-1">
                <button class="btn btn-outline-secondary btn-sm" data-layer="label"
                    onclick="toggleLayer('label')">Labels</button>
                <input type="color" class="form-control form-control-color" data-color-layer="nose" title="สีของ Nose"
                    value="#ffd700" onchange="setLayerColor('nose', this.value)" />
            </div>
            <div class="d-flex align-items-center gap-2">
                <label for="lineWidthRange" class="small text-muted mb-0">ความหนาเส้น</label>
                <input type="range" class="form-range" id="lineWidthRange" style="width: 120px;" min="0.5" max="4"
                    step="0.5" value="1" oninput="setLineWidthScale(this.value)" />
            </div>
            <button class="btn btn-outline-danger btn-sm" onclick="resetColors()">รีเซ็ตสี</button>
        </div>
        <div align="center" style="position: relative; border: 1px solid #ccc; max-width: 800px; margin: auto;">
            <video id="video" autoplay playsinline muted style="display: none;"></video>
            <canvas id="canvas" width="640" height="480"
                style="display: block; width: 100%; height: auto; background: #f5f5f5;"></canvas>
            <div id="loadingOverlay"
                style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.9);">
                <span id="loadingText">กำลังโหลดโมเดล...</span>
            </div>
        </div>
        <div class="row mt-3">
            <div class="col-md-4 mb-2">
                <div class="border p-2">
                    <div class="small text-muted">ใบหน้าที่พบ</div>
                    <div id="faceCount">0</div>
                </div>
            </div>
            <div class="col-md-4 mb-2">
                <div class="border p-2">
                    <div class="small text-muted">Landmark Points</div>
                    <div id="landmarkCount">—</div>
                </div>
            </div>
            <div class="col-md-4 mb-2">
                <div class="border p-2">
                    <div class="small text-muted">สถานะ</div>
                    <div id="statusText">รอ...</div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/static/face.js?v=9"></script>
</body>

</html>
